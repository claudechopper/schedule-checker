<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schedule Checker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0d1117; color: #e6edf3; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; padding: 24px 20px; max-width: 860px; margin: 0 auto; }
  h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 4px; }
  .subtitle { color: #8b949e; font-size: 0.88rem; margin-bottom: 22px; }
  .card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 20px; margin-bottom: 18px; }

  /* Upload */
  .dropzone { border: 2px dashed #30363d; border-radius: 10px; padding: 44px 20px; text-align: center; cursor: pointer; transition: border-color 0.2s, background 0.2s; }
  .dropzone:hover, .dropzone.drag { border-color: #58a6ff; background: #1c2433; }
  .dropzone input { display: none; }
  .dz-icon { font-size: 2.4rem; margin-bottom: 10px; }
  .dz-text { color: #8b949e; font-size: 0.9rem; line-height: 1.6; }
  .dz-text strong { color: #58a6ff; }
  .filename { margin-top: 10px; font-size: 0.85rem; color: #3fb950; font-weight: 600; }

  /* Settings */
  .settings { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 16px; }
  .sg { display: flex; flex-direction: column; gap: 4px; }
  .sg label { font-size: 0.78rem; color: #8b949e; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }
  .sg select { background: #21262d; border: 1px solid #30363d; color: #e6edf3; border-radius: 6px; padding: 6px 10px; font-size: 0.88rem; }

  /* Buttons */
  .btn { display: inline-flex; align-items: center; gap: 7px; padding: 10px 20px; border-radius: 8px; border: none; font-size: 0.92rem; font-weight: 600; cursor: pointer; transition: background 0.15s; }
  .btn-primary { background: #238636; color: #fff; width: 100%; justify-content: center; padding: 12px; font-size: 1rem; margin-top: 4px; }
  .btn-primary:hover { background: #2ea043; }
  .btn-primary:disabled { background: #1a3a22; color: #3a6140; cursor: not-allowed; }
  .btn-ghost { background: #21262d; color: #e6edf3; border: 1px solid #30363d; }
  .btn-ghost:hover { background: #30363d; }

  /* Status */
  #status { padding: 10px 14px; border-radius: 8px; margin-top: 12px; font-size: 0.88rem; display: none; }
  .s-error { background: #2d1515; border: 1px solid #da3633; color: #ffa198; }

  /* Results */
  #results { display: none; }
  .section-label { font-size: 0.78rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #8b949e; margin-bottom: 10px; }
  .week-range { font-size: 0.82rem; color: #8b949e; margin-bottom: 14px; }

  .gap-item { border-left: 3px solid #da3633; padding: 10px 14px; background: #1a1215; border-radius: 0 8px 8px 0; margin-bottom: 9px; }
  .gap-day { font-size: 0.95rem; font-weight: 700; margin-bottom: 2px; }
  .gap-detail { font-size: 0.83rem; color: #ffa198; }
  .no-gaps { color: #3fb950; font-weight: 600; font-size: 0.95rem; padding: 6px 0; }

  .grid-scroll { overflow-x: auto; }
  table.grid { border-collapse: collapse; font-size: 0.8rem; }
  table.grid th { background: #21262d; color: #8b949e; padding: 7px 11px; border: 1px solid #30363d; white-space: nowrap; font-weight: 600; }
  table.grid td { padding: 7px 11px; border: 1px solid #21262d; text-align: center; font-weight: 700; min-width: 44px; }
  .c-ok   { background: #0d2818; color: #3fb950; }
  .c-warn { background: #2d1f06; color: #d29922; }
  .c-bad  { background: #2d1515; color: #da3633; }
  .c-zero { background: #161b22; color: #484f58; }

  .reset-row { margin-top: 6px; }
</style>
</head>
<body>

<h1>📋 Schedule Checker</h1>
<p class="subtitle">Export your schedule from Joltup as CSV, then upload it here</p>

<div class="card" id="upload-card">
  <div class="settings">
    <div class="sg">
      <label>Open From</label>
      <select id="start-hour">
        <option value="7">7 AM</option>
        <option value="8">8 AM</option>
        <option value="9" selected>9 AM</option>
        <option value="10">10 AM</option>
      </select>
    </div>
    <div class="sg">
      <label>Close At</label>
      <select id="end-hour">
        <option value="17">5 PM</option>
        <option value="18">6 PM</option>
        <option value="19" selected>7 PM</option>
        <option value="20">8 PM</option>
        <option value="21">9 PM</option>
        <option value="22">10 PM</option>
      </select>
    </div>
    <div class="sg">
      <label>Min Staff</label>
      <select id="min-staff">
        <option value="1">1</option>
        <option value="2" selected>2</option>
        <option value="3">3</option>
        <option value="4">4</option>
      </select>
    </div>
  </div>

  <div class="dropzone" id="dropzone">
    <input type="file" id="file-input" accept=".csv,.xls,.xlsx,text/csv">
    <div class="dz-icon">📂</div>
    <div class="dz-text">
      <strong>Click to upload</strong> or drag & drop<br>
      Joltup CSV export
    </div>
    <div class="filename" id="filename"></div>
  </div>

  <div id="status"></div>
  <button class="btn btn-primary" id="check-btn" disabled>Check Coverage</button>
</div>

<div id="results">
  <div class="card">
    <div class="section-label">Staffing Gaps</div>
    <div class="week-range" id="week-range"></div>
    <div id="gaps-list"></div>
  </div>
  <div class="card">
    <div class="section-label">Coverage Grid</div>
    <div class="grid-scroll"><table class="grid" id="grid"></table></div>
  </div>
  <div class="reset-row">
    <button class="btn btn-ghost" id="reset-btn">← Upload Another File</button>
  </div>
</div>

<script>
// ── State ──
let parsedShifts = []; // [{name, date, dateObj, start, end}]

// ── DOM refs ──
const dropzone   = document.getElementById('dropzone');
const fileInput  = document.getElementById('file-input');
const filenameEl = document.getElementById('filename');
const checkBtn   = document.getElementById('check-btn');
const statusEl   = document.getElementById('status');

// ── Dropzone wiring ──
dropzone.addEventListener('click', () => fileInput.click());
dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('drag'); });
dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag'));
dropzone.addEventListener('drop', e => {
  e.preventDefault(); dropzone.classList.remove('drag');
  if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', e => { if (e.target.files[0]) loadFile(e.target.files[0]); });

document.getElementById('reset-btn').addEventListener('click', () => {
  parsedShifts = [];
  fileInput.value = '';
  filenameEl.textContent = '';
  checkBtn.disabled = true;
  document.getElementById('results').style.display = 'none';
  document.getElementById('upload-card').style.display = 'block';
  hideStatus();
});

// ── Load & parse CSV ──
function loadFile(file) {
  hideStatus();
  filenameEl.textContent = '';
  parsedShifts = [];
  checkBtn.disabled = true;

  Papa.parse(file, {
    header: true,
    skipEmptyLines: true,
    complete: function(results) {
      try {
        const shifts = parseJoltupCSV(results.data);
        if (shifts.length === 0) {
          showError('No shifts found in this file. Make sure you\'re uploading the Joltup schedule export.');
          return;
        }
        parsedShifts = shifts;
        filenameEl.textContent = '✓ ' + file.name + ' — ' + shifts.length + ' shifts loaded';
        checkBtn.disabled = false;
      } catch(e) {
        showError('Could not read file: ' + e.message);
      }
    },
    error: function(e) { showError('Parse error: ' + e.message); }
  });
}

function parseJoltupCSV(rows) {
  const shifts = [];
  rows.forEach(function(row) {
    // Column names (case-insensitive, trim whitespace)
    const cols = {};
    Object.keys(row).forEach(function(k) { cols[k.trim().toLowerCase()] = row[k]; });

    const name    = cols['employee'] || cols['name'] || cols['employee name'] || '';
    const dateStr = cols['date'] || '';
    const timeIn  = cols['time in'] || cols['start'] || cols['start time'] || '';
    const timeOut = cols['time out'] || cols['end'] || cols['end time'] || '';

    if (!name || !dateStr || !timeIn || !timeOut) return;

    const dateObj = parseDate(dateStr);
    if (!dateObj) return;

    const start = parseTime(timeIn);
    const end   = parseTime(timeOut);
    if (start === null || end === null) return;

    shifts.push({ name: name.trim(), dateObj: dateObj, start: start, end: end });
  });
  return shifts;
}

// Parse dates: "2026-03-30", "03/30/2026", "March 30, 2026", "30/03/2026" etc.
function parseDate(str) {
  if (!str) return null;
  str = str.trim();
  // ISO: 2026-03-30
  var m = str.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if (m) return new Date(+m[1], +m[2]-1, +m[3]);
  // MM/DD/YYYY
  m = str.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if (m) return new Date(+m[3], +m[1]-1, +m[2]);
  // DD/MM/YYYY
  m = str.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})$/);
  if (m) { var yr = +m[3]; if (yr < 100) yr += 2000; return new Date(yr, +m[2]-1, +m[1]); }
  // "March 30, 2026"
  var d = new Date(str);
  if (!isNaN(d)) return d;
  return null;
}

// Parse times: "9:00 AM", "09:00", "9:00", "21:00", "9:00:00 AM" etc.
// Returns decimal hours (9.5 = 9:30 AM)
function parseTime(str) {
  if (!str) return null;
  str = str.trim();
  // "9:00 AM" / "9:00:00 PM"
  var m = str.match(/^(\d{1,2}):(\d{2})(?::\d{2})?\s*(AM|PM)$/i);
  if (m) {
    var h = +m[1], min = +m[2], ampm = m[3].toUpperCase();
    if (ampm === 'AM') { if (h === 12) h = 0; }
    else               { if (h !== 12) h += 12; }
    return h + min/60;
  }
  // "09:00" or "9:00" (24-hr or bare)
  m = str.match(/^(\d{1,2}):(\d{2})(?::\d{2})?$/);
  if (m) return +m[1] + +m[2]/60;
  return null;
}

// ── Check Coverage ──
checkBtn.addEventListener('click', function() { runCheck(); });

function runCheck() {
  if (!parsedShifts.length) return;
  const startH  = parseInt(document.getElementById('start-hour').value);
  const endH    = parseInt(document.getElementById('end-hour').value);
  const minStaff = parseInt(document.getElementById('min-staff').value);

  // Group by date, sorted
  const dateMap = {};
  parsedShifts.forEach(function(s) {
    var key = s.dateObj.toISOString().slice(0,10); // "2026-03-30"
    if (!dateMap[key]) dateMap[key] = { dateObj: s.dateObj, shifts: [] };
    dateMap[key].shifts.push(s);
  });
  var dateKeys = Object.keys(dateMap).sort();

  // Week range label
  var first = dateMap[dateKeys[0]].dateObj;
  var last  = dateMap[dateKeys[dateKeys.length-1]].dateObj;
  document.getElementById('week-range').textContent = fmtDate(first) + ' – ' + fmtDate(last);

  // Hours array
  var hours = [];
  for (var h = startH; h < endH; h++) hours.push(h);

  // Build coverage per day per hour
  var coverage  = {}; // dateKey -> hour -> count
  var staffNames = {}; // dateKey -> hour -> [names]
  dateKeys.forEach(function(dk) {
    coverage[dk]   = {};
    staffNames[dk] = {};
    hours.forEach(function(h) { coverage[dk][h] = 0; staffNames[dk][h] = []; });
    dateMap[dk].shifts.forEach(function(s) {
      hours.forEach(function(h) {
        if (h >= s.start && h < s.end) {
          coverage[dk][h]++;
          staffNames[dk][h].push(s.name);
        }
      });
    });
  });

  // Render gaps
  var gapsEl = document.getElementById('gaps-list');
  gapsEl.innerHTML = '';
  var totalGaps = 0;
  dateKeys.forEach(function(dk) {
    var label = fmtDayDate(dateMap[dk].dateObj);
    var gapStart = null;
    for (var i = 0; i <= hours.length; i++) {
      var h = hours[i];
      var cnt = (h !== undefined) ? coverage[dk][h] : minStaff;
      if (cnt < minStaff) {
        if (gapStart === null) gapStart = h;
      } else {
        if (gapStart !== null) {
          var names = unique(staffNames[dk][gapStart]);
          var div = document.createElement('div');
          div.className = 'gap-item';
          var who = names.length ? names.join(', ') : 'nobody scheduled';
          div.innerHTML = '<div class="gap-day">' + label + '</div>' +
            '<div class="gap-detail">' + fmtHour(gapStart) + ' – ' + fmtHour(h) +
            ' — only ' + coverage[dk][gapStart] + ' person' + (coverage[dk][gapStart] !== 1 ? 's' : '') +
            ' (' + who + ')</div>';
          gapsEl.appendChild(div);
          totalGaps++;
          gapStart = null;
        }
      }
    }
  });
  if (totalGaps === 0) {
    gapsEl.innerHTML = '<p class="no-gaps">✅ Full coverage — no gaps found!</p>';
  }

  // Render grid
  var gridEl = document.getElementById('grid');
  var html = '<tr><th>Date</th>' + hours.map(function(h){ return '<th>' + fmtHour(h) + '</th>'; }).join('') + '</tr>';
  dateKeys.forEach(function(dk) {
    var shortLabel = fmtShort(dateMap[dk].dateObj);
    html += '<tr><th>' + shortLabel + '</th>';
    hours.forEach(function(h) {
      var n = coverage[dk][h];
      var cls = n >= minStaff ? 'c-ok' : n > 0 ? 'c-warn' : 'c-bad';
      var tip = (staffNames[dk][h] || []).join(', ') || 'nobody';
      html += '<td class="' + cls + '" title="' + tip + '">' + n + '</td>';
    });
    html += '</tr>';
  });
  gridEl.innerHTML = html;

  document.getElementById('upload-card').style.display = 'none';
  document.getElementById('results').style.display = 'block';
}

// ── Helpers ──
function unique(arr) {
  var seen = {}, out = [];
  arr.forEach(function(x){ if (!seen[x]){ seen[x]=1; out.push(x); } });
  return out;
}

var DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
var MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function fmtDate(d) {
  return MONTHS[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear();
}
function fmtDayDate(d) {
  return DAYS[d.getDay()] + ' ' + MONTHS[d.getMonth()] + ' ' + d.getDate();
}
function fmtShort(d) {
  return DAYS[d.getDay()] + ' ' + (d.getMonth()+1) + '/' + d.getDate();
}
function fmtHour(h) {
  if (h === 0)  return '12AM';
  if (h < 12)  return h + 'AM';
  if (h === 12) return '12PM';
  return (h - 12) + 'PM';
}

function showError(msg) { statusEl.className = 's-error'; statusEl.textContent = '⚠️ ' + msg; statusEl.style.display = 'block'; }
function hideStatus()   { statusEl.style.display = 'none'; }
</script>
</body>
</html>
